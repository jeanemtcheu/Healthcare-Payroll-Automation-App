{% extends "base.html" %}

{% block content %}
<h1>Caretakers</h1>

<section class="form-card">
    <h2>Add Caretaker</h2>

    <form action="{{ url_for('add_caretaker_route') }}" method="POST">
        <input type="text" name="caretaker_name" placeholder="Caretaker Name" required>
        <input type="number" step="0.01" name="hourly_rate" placeholder="Hourly Rate" required>
        <button type="submit">Add Caretaker</button>
    </form>
</section>

<section>
    <h2>Existing Caretakers</h2>

    <table>
        <tr>
            <th>ID</th>
            <th>Name</th>
            <th>Hourly Rate</th>
            <th>Status</th>
            <th>Actions</th>
        </tr>

        {% for caretaker in caretakers %}
        <tr>
            <form action="{{ url_for('update_caretaker_route', caretaker_id=caretaker.caretaker_id) }}" method="POST">
                <td>{{ caretaker.caretaker_id }}</td>
                <td><input type="text" name="caretaker_name" value="{{ caretaker.caretaker_name }}"></td>
                <td><input type="number" step="0.01" name="hourly_rate" value="{{ caretaker.hourly_rate }}"></td>
                <td>
                    <select name="active_status">
                        <option value="Active" {% if caretaker.active_status == "Active" %}selected{% endif %}>Active</option>
                        <option value="Inactive" {% if caretaker.active_status == "Inactive" %}selected{% endif %}>Inactive</option>
                    </select>
                </td>
                <td>
                    <button type="submit">Update</button>
            </form>

            <form action="{{ url_for('delete_caretaker_route', caretaker_id=caretaker.caretaker_id) }}" method="POST" class="inline-form">
                    <button type="submit" class="danger">Delete</button>
            </form>
                </td>
        </tr>
        {% endfor %}
    </table>
</section>
{% endblock %}
