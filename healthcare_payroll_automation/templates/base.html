<!DOCTYPE html>
<html>
<head>
    <title>Byzantine Payroll App</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>

<body>
    <nav>
        <h2>Byzantine Payroll</h2>
        <a href="{{ url_for('dashboard') }}">Dashboard</a>
        <a href="{{ url_for('clients_page') }}">Clients</a>
        <a href="{{ url_for('caretakers_page') }}">Caretakers</a>
        <a href="{{ url_for('shifts_page') }}">Shifts</a>
        <a href="{{ url_for('payroll_page') }}">Run Payroll</a>
    </nav>

    <main>
        {% with messages = get_flashed_messages() %}
            {% if messages %}
                <div class="flash">
                    {% for message in messages %}
                        <p>{{ message }}</p>
                    {% endfor %}
                </div>
            {% endif %}
        {% endwith %}

        {% block content %}{% endblock %}
    </main>
</body>
</html>
