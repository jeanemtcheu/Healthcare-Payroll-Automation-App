{% extends "base.html" %}

{% block content %}
<h1>Run Payroll</h1>

<section class="form-card">
    <p>This will process all current clients, caretakers, and shifts stored in the database.</p>

    <form action="{{ url_for('run_payroll_route') }}" method="POST">
        <button type="submit" class="primary">Generate Paystubs and Timesheets</button>
    </form>
</section>

<section>
    <p>Generated documents will appear in the <strong>outputs</strong> folder.</p>
</section>
{% endblock %}
