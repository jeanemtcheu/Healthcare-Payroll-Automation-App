{% extends "base.html" %}

{% block content %}
<h1>Clients</h1>

<section class="form-card">
    <h2>Add Client</h2>

    <form action="{{ url_for('add_client_route') }}" method="POST">
        <input type="text" name="client_name" placeholder="Client Name" required>
        <input type="number" step="0.25" name="weekly_authorized_hours" placeholder="Weekly Authorized Hours" required>
        <button type="submit">Add Client</button>
    </form>
</section>

<section>
    <h2>Existing Clients</h2>

    <table>
        <tr>
            <th>ID</th>
            <th>Name</th>
            <th>Weekly Hours</th>
            <th>Status</th>
            <th>Actions</th>
        </tr>

        {% for client in clients %}
        <tr>
            <form action="{{ url_for('update_client_route', client_id=client.client_id) }}" method="POST">
                <td>{{ client.client_id }}</td>
                <td><input type="text" name="client_name" value="{{ client.client_name }}"></td>
                <td><input type="number" step="0.25" name="weekly_authorized_hours" value="{{ client.weekly_authorized_hours }}"></td>
                <td>
                    <select name="active_status">
                        <option value="Active" {% if client.active_status == "Active" %}selected{% endif %}>Active</option>
                        <option value="Inactive" {% if client.active_status == "Inactive" %}selected{% endif %}>Inactive</option>
                    </select>
                </td>
                <td>
                    <button type="submit">Update</button>
            </form>

            <form action="{{ url_for('delete_client_route', client_id=client.client_id) }}" method="POST" class="inline-form">
                    <button type="submit" class="danger">Delete</button>
            </form>
                </td>
        </tr>
        {% endfor %}
    </table>
</section>
{% endblock %}
